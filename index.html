<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Générateur de QR Code</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: #111;
    }

    p.subtitle {
      font-size: 0.88rem;
      color: #777;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #6c63ff; }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.25rem;
    }

    .option-group { display: flex; flex-direction: column; }

    input[type="color"] {
      width: 100%;
      height: 36px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 2px 4px;
      cursor: pointer;
      background: none;
    }

    select {
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      background: #fff;
      cursor: pointer;
    }

    select:focus { border-color: #6c63ff; }

    button.main-btn {
      width: 100%;
      padding: 11px;
      font-size: 14px;
      font-weight: 500;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 1.25rem;
    }

    button.main-btn:hover { background: #5a52e0; }
    button.main-btn:active { transform: scale(0.98); }

    #qr-container {
      display: none;
      text-align: center;
      padding-top: 1.25rem;
      border-top: 1px solid #eee;
    }

    #qr-output {
      display: inline-block;
      padding: 16px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #eee;
      margin-bottom: 0.75rem;
    }

    #qr-url {
      font-size: 11px;
      color: #aaa;
      word-break: break-all;
      margin-bottom: 1rem;
      padding: 0 1rem;
    }

    .dl-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 0.5rem;
    }

    button.dl-btn {
      background: #f0efff;
      color: #6c63ff;
      font-size: 13px;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }

    button.dl-btn:hover { background: #e3e1ff; }

    .error {
      display: none;
      font-size: 13px;
      color: #e24b4a;
      margin-bottom: 0.75rem;
    }

    #history-section {
      display: none;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid #eee;
    }

    #history-section h2 {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      gap: 8px;
    }

    .history-item:hover { background: #f7f7f7; }

    .history-url {
      font-size: 13px;
      color: #444;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .history-reuse {
      font-size: 11px;
      color: #aaa;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>QR Code Generator by Synn0_.</h1>
    <p class="subtitle">Collez un lien, ajustez les options, téléchargez.</p>

    <label for="url-input">Lien</label>
    <div class="input-row">
      <input type="text" id="url-input" placeholder="https://exemple.com" />
    </div>

    <p class="error" id="error-msg"></p>

    <div class="options-grid">
      <div class="option-group">
        <label for="color-dark">Couleur QR</label>
        <input type="color" id="color-dark" value="#000000" />
      </div>
      <div class="option-group">
        <label for="color-light">Fond</label>
        <input type="color" id="color-light" value="#ffffff" />
      </div>
      <div class="option-group">
        <label for="qr-size">Taille</label>
        <select id="qr-size">
          <option value="150">Petit</option>
          <option value="200" selected>Moyen</option>
          <option value="300">Grand</option>
          <option value="400">XL</option>
        </select>
      </div>
    </div>

    <button class="main-btn" id="generate-btn">Générer le QR code</button>

    <div id="qr-container">
      <div id="qr-output"></div>
      <p id="qr-url"></p>
      <div class="dl-row">
        <button class="dl-btn" id="dl-png">⬇ PNG</button>
        <button class="dl-btn" id="dl-svg">⬇ SVG</button>
      </div>
    </div>

    <div id="history-section">
      <h2>Historique</h2>
      <div id="history-list"></div>
    </div>
  </div>

  <script>
    const input = document.getElementById('url-input');
    const btn = document.getElementById('generate-btn');
    const container = document.getElementById('qr-container');
    const output = document.getElementById('qr-output');
    const dlPng = document.getElementById('dl-png');
    const dlSvg = document.getElementById('dl-svg');
    const errMsg = document.getElementById('error-msg');
    const qrUrlEl = document.getElementById('qr-url');
    const colorDark = document.getElementById('color-dark');
    const colorLight = document.getElementById('color-light');
    const sizeSelect = document.getElementById('qr-size');
    const historySection = document.getElementById('history-section');
    const historyList = document.getElementById('history-list');

    let history = JSON.parse(localStorage.getItem('qr-history') || '[]');
    let lastUrl = '';

    function generate() {
      const url = input.value.trim();
      errMsg.style.display = 'none';

      if (!url) { showError('Veuillez entrer un lien.'); return; }
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        showError('Le lien doit commencer par https:// ou http://');
        return;
      }

      lastUrl = url;
      const size = parseInt(sizeSelect.value);

      output.innerHTML = '';
      new QRCode(output, {
        text: url,
        width: size,
        height: size,
        colorDark: colorDark.value,
        colorLight: colorLight.value,
        correctLevel: QRCode.CorrectLevel.H
      });

      qrUrlEl.textContent = url;
      container.style.display = 'block';

      addToHistory(url);
    }

    function showError(msg) {
      errMsg.textContent = msg;
      errMsg.style.display = 'block';
      container.style.display = 'none';
    }

    function addToHistory(url) {
      history = [url, ...history.filter(u => u !== url)].slice(0, 5);
      localStorage.setItem('qr-history', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      if (history.length === 0) { historySection.style.display = 'none'; return; }
      historySection.style.display = 'block';
      historyList.innerHTML = '';
      history.forEach(url => {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `<span class="history-url">${url}</span><span class="history-reuse">↩ réutiliser</span>`;
        item.addEventListener('click', () => { input.value = url; generate(); });
        historyList.appendChild(item);
      });
    }

    dlPng.addEventListener('click', () => {
      const canvas = output.querySelector('canvas');
      if (!canvas) return;
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    dlSvg.addEventListener('click', () => {
      const size = parseInt(sizeSelect.value);
      const dark = colorDark.value;
      const light = colorLight.value;
      const canvas = output.querySelector('canvas');
      if (!canvas) return;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}"><image href="${canvas.toDataURL('image/png')}" width="${size}" height="${size}"/></svg>`;
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const link = document.createElement('a');
      link.download = 'qrcode.svg';
      link.href = URL.createObjectURL(blob);
      link.click();
    });

    btn.addEventListener('click', generate);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });

    renderHistory();
  </script>
</body>
</html>
